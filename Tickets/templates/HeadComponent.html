{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta content="{{ site_settings.meta_description }}" name="description">
    <meta content="{{ site_settings.meta_keywords }}" name="keywords">

    <title>
        {% if page_title %}
            {{ page_title }}
        {% else %}
            {{ site_settings.meta_title }}
        {% endif %}
    </title>

    {% if LANGUAGE_CODE == "fa" %}
    <link rel="stylesheet" href="{% static 'vendor/bootstrap/css/bootstrap.rtl.min.css' %}">
    {% else %}
    <link rel="stylesheet" href="{% static 'vendor/bootstrap/css/bootstrap.min.css' %}">
    {% endif %}
    <link rel="icon" href="{% static 'icons/icons8-ticket-100.png' %}" type="image/png">
    <link href="{% static 'vendor/fontawesome-free/css/all.min.css' %}" rel="stylesheet">
    <link href="{% static 'vendor/bootstrap-icons/bootstrap-icons.min.css' %}" rel="stylesheet">
    <link href="{% static 'vendor/swiper/swiper-bundle.min.css' %}" rel="stylesheet">
    <link href="{% static 'vendor/fontawesome-free/css/all.min.css' %}" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="{% static 'img/favicon-32x32.png' %}">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
